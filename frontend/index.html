<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EduVerse — Plataforma educativa universitaria moderna." />
  <title>EduVerse — Plataforma Educativa</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Nav overlay for mobile -->
  <div class="nav-overlay" id="nav-overlay"></div>

  <!-- Navigation — hidden until authenticated -->
  <nav class="navbar" id="navbar" style="display:none">
    <div class="nav-inner">
      <div class="nav-logo" onclick="navigate('home')">
        <div class="nav-logo-mark">🎓</div>
        EduVerse
      </div>

      <ul class="nav-links" id="nav-links">
        <li><a class="nav-link active" id="nav-home" onclick="navigate('home')">Inicio</a></li>
        <li><a class="nav-link" id="nav-search" onclick="navigate('search')">Carreras</a></li>
        <li><a class="nav-link" onclick="triggerAreaSearch('Tecnología')">Tecnología</a></li>
        <li><a class="nav-link" onclick="triggerAreaSearch('Salud')">Salud</a></li>
      </ul>

      <div class="nav-user" id="nav-user-section">
        <!-- Populated by auth.js -->
      </div>

      <button class="nav-hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Main app — shown after auth -->
  <main id="app" style="display:none">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:16px">🎓</div>
        <div style="color:var(--text-muted);font-size:.9rem">Cargando...</div>
      </div>
    </div>
  </main>

  <!-- Auth screen — shown before login -->
  <div id="auth-container"></div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
